root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/qp ./cmd/qp"
bin = "./tmp/qp"
args_bin = ["serve:api"]
include_ext = ["go"]
# Watch the whole apps/api/ tree (root + cmd + internal) so additions
# like migrations.go at the module root trigger rebuilds. Excluding
# the .sql extension keeps editing a migration file from kicking the
# server, since the embedded FS only refreshes on a Go recompile.
exclude_ext = ["sql"]
exclude_dir = ["tmp", "bin", ".git"]
delay = 200
stop_on_error = true
send_interrupt = true
kill_delay = "2s"

[log]
time = true

[misc]
clean_on_exit = true
