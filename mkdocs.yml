site_name: quranprism docs
site_description: Product requirements and engineering documentation for quranprism.

# docs/ is the site root. PRD lives in /prd (source of truth) and is surfaced
# here through the docs/prd symlink — edit files under prd/, not docs/prd.
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences

# `awesome-nav` lets us point a nav entry at a directory (Tasks, Decisions)
# so files added later — new T-NNN handoffs, new ADRs — show up
# automatically without a mkdocs.yml edit on every task / decision.
plugins:
  - search
  - awesome-nav

# _TEMPLATE.md files are scaffolds, not pages.
exclude_docs: |
  prd/_TEMPLATE.md
  tasks/_TEMPLATE.md

# Site navigation is driven by `.nav.yml` files distributed through the
# docs tree (root: docs/.nav.yml). awesome-nav v3 ignores `nav:` declared
# here, so keeping the structure next to the docs themselves means a new
# task / ADR / PRD shows up automatically without touching this file.
