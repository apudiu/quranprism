# NATS dev config for the local compose stack.
# Enables JetStream (durable streams / queue groups / KV) and the WebSocket
# gateway so browsers can subscribe directly. Production overrides arrive
# later as a k8s ConfigMap under deploy/k8s/.

port: 4222          # clients (Go server, future Bun edge code)
http_port: 8222     # /healthz, /varz, /jsz monitoring

jetstream {
  store_dir: /data
}

# Browser-facing WebSocket transport. Used by sync-session control + the
# notification inbox stream once those features land. No TLS in dev because
# the compose network is local-only; prod terminates TLS at the ingress.
websocket {
  port: 8080
  no_tls: true
}
